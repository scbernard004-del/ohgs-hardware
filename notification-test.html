<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OHGS Notification Test</title><style>body{font-family:Arial,sans-serif;background:#07111f;color:white;padding:30px}button{padding:14px 20px;border:0;border-radius:12px;background:#16d46b;color:white;font-weight:800;cursor:pointer}.box{max-width:720px;background:#10243d;padding:24px;border-radius:20px}</style><link rel="stylesheet" href="ohgs-final-clean-patch.css"></head><body><div class="box"><h1>OHGS Notification Test</h1><p>Local test returns OK. Real email sends on Vercel after SMTP variables.</p><button id="testBtn">Send Test Notification</button><pre id="out"></pre></div><script>document.getElementById('testBtn').onclick=async()=>{const out=document.getElementById('out');out.textContent='Sending...';try{const r=await fetch('/api/notify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({eventType:'Test Notification',action:'Manual test from notification-test.html',page:location.href})});const j=await r.json();out.textContent=JSON.stringify(j,null,2);}catch(e){out.textContent=e.message}};</script><script src="ohgs-final-clean-patch.js"></script></body></html>
